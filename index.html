<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Landing Page</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
}

.hero{
  background:url("https://images.unsplash.com/photo-1521737604893-d14cc237f11d") center/cover no-repeat;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.overlay{
  background:rgba(0,0,0,0.6);
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

.content{
  position:relative;
  z-index:2;
}

h1{
  font-size:34px;
  margin:0;
}

p{
  margin-top:10px;
}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:12px 20px;
  background:#4f46e5;
  color:white;
  text-decoration:none;
  border-radius:8px;
  font-weight:bold;
}

.section{
  background:#f5f7ff;
  color:black;
  padding:40px 20px;
  text-align:center;
}

.card{
  background:white;
  margin:10px;
  padding:20px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="hero">
  <div class="overlay"></div>

  <div class="content">
    <h1>I Build High-Quality Landing Pages</h1>
    <p>Fast • Responsive • Modern Design</p>
    <a href="#" class="btn">Hire Me</a>
  </div>
</div>

<div class="section">
  <h2>My Services</h2>
  <div class="card">Business Landing Page</div>
  <div class="card">Product Landing Page</div>
  <div class="card">Portfolio Website</div>
</div>

</body>
</html>
